<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Sleep Monitor</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  background:
    radial-gradient(circle at 20% 15%, rgba(96,165,250,.25), transparent 35%),
    radial-gradient(circle at 80% 80%, rgba(34,197,94,.15), transparent 30%),
    #081120;
  color:white;
  font-family:Arial,sans-serif;
  overflow:hidden;
}
h1{font-size:42px;margin-bottom:10px;}
p{color:#94A3B8;}
.loader{
  margin-top:30px;
  width:60px;height:60px;
  border:4px solid rgba(255,255,255,.1);
  border-top:4px solid #10B981;
  border-radius:50%;
  animation:spin 1s linear infinite;
}
@keyframes spin{100%{transform:rotate(360deg);}}
body::before{
  content:"";
  position:fixed;
  top:50px;
  right:80px;
  width:120px;
  height:120px;
  border-radius:50%;
  background:rgba(255,255,255,.08);
  box-shadow:0 0 30px rgba(255,255,255,.08),0 0 60px rgba(96,165,250,.08);
}
</style>
</head>
<body>
<h1>🌙 Smart Sleep Monitor</h1>
<p>Loading Dashboard...</p>
<div class="loader"></div>

<script>
setTimeout(() => {
  window.location.href = "WEB_HTML.html";
}, 2500);
</script>
</body>
</html>
