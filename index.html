<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Sleep Environment Monitor</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:20px;
  overflow:hidden;

  background:
    radial-gradient(circle at 20% 15%, rgba(96,165,250,.25), transparent 35%),
    radial-gradient(circle at 80% 80%, rgba(34,197,94,.15), transparent 30%),
    radial-gradient(circle at 50% 50%, rgba(255,255,255,.03), transparent 50%),
    #081120;

  color:white;
  font-family:'Segoe UI',sans-serif;
}

/* 🌙 พระจันทร์ */
body::before{
  content:"";
  position:fixed;

  top:50px;
  right:80px;

  width:120px;
  height:120px;

  border-radius:50%;

  background:rgba(255,255,255,.08);

  box-shadow:
    0 0 30px rgba(255,255,255,.08),
    0 0 60px rgba(96,165,250,.08);

  pointer-events:none;
}
/* 🌙 โลโก้ */
.logo{
  font-size:90px;
  margin-bottom:20px;
  filter:drop-shadow(0 0 20px rgba(255,255,255,.3));
  animation:float 3s ease-in-out infinite;
}

@keyframes float{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-10px);}
}

h1{
  font-size:clamp(28px,6vw,42px);
  margin-bottom:10px;
  font-weight:700;
}

.subtitle{
  color:#94A3B8;
  font-size:clamp(14px,3vw,18px);
  margin-bottom:30px;
}

.loader{
  width:60px;
  height:60px;

  border:4px solid rgba(255,255,255,.1);
  border-top:4px solid #10B981;

  border-radius:50%;

  animation:spin 1s linear infinite;
}

@keyframes spin{
  100%{
    transform:rotate(360deg);
  }
}

.loading-text{
  margin-top:18px;
  color:#94A3B8;
  font-size:14px;
  letter-spacing:1px;
}

@media (max-width:768px){

  .logo{
    font-size:70px;
  }

  body::before{
    top:20px;
    right:20px;
    width:70px;
    height:70px;
  }

  .loader{
    width:45px;
    height:45px;
  }

  h1{
    font-size:28px;
  }
}
</style>
</head>

<body>

<div class="logo">🌙</div>

<h1>Smart Sleep Environment Monitor</h1>

<div class="subtitle">
ESP32 • Firebase • Realtime Dashboard
</div>

<div class="loader"></div>

<div class="loading-text">
กำลังโหลดข้อมูล...
</div>

<script>
setTimeout(() => {
  window.location.href = "WEB_HTML.html";
}, 3000);
</script>

</body>
</html>
